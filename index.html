<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>man</title>
    <style>
        body {
            background-image: url(background.jpg);
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
            user-select: none;
            cursor: default;  
        }
        .egg {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url("egg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        h1 {
           position: absolute;
           background-color: rgb(0, 255, 0);
        }

        .butotn {
            text-align: right;
            top:0px;
            position: absolute;
        }
    </style>
</head>
<body>
    <h1 id="theengery">energy: 109</h1>
    <img src="man.bmp" id="sdfsdf" style="position: relative;">
    <div class="butotn">
        <button onclick="energy = energy + 4">drimk pickle falvoured water</button>
    </div>
    <script>
        let viewportBottomEdge = window.innerHeight;
        let viewportRightEdge = window.innerWidth;
        let maxYforlittleman = viewportBottomEdge - 210;
        let maxXforlittleman = viewportRightEdge - 160;
        let manman = document.getElementById("sdfsdf");
        let ypos = 1;
        let xpos = 1;
        let Yspeed = 0;
        let Xspeed = 0;
        let gravity = 0.2;
        let jumpStrength = -10;
        let sppedd = 5;
        let isGrounded = false;
        let eggnum = 1;
        let energy = 109;
        let isGameOver = false; 
        const eggs = [];

        function gaemoger() {
            isGameOver = true;
            alert("oh no game over! your score was " + eggnum);
            energy = 122;
            document.body.innerHTML = '';
            document.body.style.backgroundImage = "url('gmaeopver.png')";
        }

        document.addEventListener("keydown", (event) => {
            if (isGameOver) return;
            if (event.key === "ArrowUp" && isGrounded) {
                Yspeed = jumpStrength;
                isGrounded = false;
            }
            if (event.key === "ArrowRight") {
                Xspeed = sppedd;
            }
            if (event.key === "ArrowLeft") {
                Xspeed = 0 - sppedd;
            }
        });

        document.addEventListener("keyup", (event) => {
            if (event.key === "ArrowRight" || event.key === "ArrowLeft") {
                Xspeed = 0;
            }
        });

        function moveman() {
            if (isGameOver) return;

            if (!isGrounded) {
                Yspeed += gravity;
            }
            ypos += Yspeed;
            if (ypos >= maxYforlittleman) {
                ypos = maxYforlittleman;
                Yspeed = 0;
                isGrounded = true;
            }
            xpos += Xspeed;
            if (xpos >= maxXforlittleman) {
                xpos = maxXforlittleman;
                Xspeed = 0;
            }
            if (xpos <= 0) {
                xpos = 0;
                Xspeed = 0;
            }
            if (manman) {
                manman.style.top = ypos + "px";
                manman.style.left = xpos + "px";
            }

            if (energy < 1) {
                gaemoger();
                return;
            }

            eggs.forEach((egg) => {
                egg.yspeed += 0.4;
                egg.y += egg.yspeed;
                let eggFloor = window.innerHeight - 25;
                let stackedOnEgg = false;
                eggs.forEach((otherEgg) => {
                    if (egg === otherEgg) return;
                    const horizontalOverlap = Math.abs(egg.x - otherEgg.x) < 50;
                    const verticalDistance = otherEgg.y - egg.y;
                    if (horizontalOverlap && verticalDistance > 0 && verticalDistance < 60 && egg.yspeed > 0) {
                        egg.y = otherEgg.y - 50;
                        egg.yspeed = 0;
                        stackedOnEgg = true;
                    }
                });
                if (!stackedOnEgg && egg.y >= eggFloor) {
                    egg.y = eggFloor;
                    egg.yspeed = 0;
                }
                egg.element.style.top = egg.y + "px";
            });
            requestAnimationFrame(moveman);
        }
        moveman();
        document.addEventListener('click', function(event) {
            if (isGameOver) return; 

            eggnum ++;
            const engnene = document.getElementById("theengery");
            if (engnene) {
                engnene.innerText = "energy: " + energy;
            }
            const mouseX = event.pageX;
            const mouseY = event.pageY;
            if (mouseY > 25) {
                const newBox = document.createElement('div');
                newBox.classList.add('egg');
                newBox.style.left = mouseX + 'px';
                newBox.style.top = mouseY + 'px';
                document.body.appendChild(newBox);
                eggs.push({
                    element: newBox,
                    y: mouseY,
                    x: mouseX,
                    yspeed: 0
                });
                energy = energy - 4;
                if (engnene) {
                    engnene.innerText = "energy: " + energy;
                }
            }
        });
    </script>
</body>
</html>
